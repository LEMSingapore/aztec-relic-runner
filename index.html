<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aztec Relic Runner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0a05;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #c8a040;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
      text-shadow: 0 0 12px #ff9900aa;
    }

    #gameCanvas {
      display: block;
      border: 2px solid #7a5c2e;
      box-shadow: 0 0 32px #ff990033;
      image-rendering: pixelated;
    }

    footer {
      margin-top: 12px;
      font-size: 0.7rem;
      color: #55401a;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <h1>☆ AZTEC RELIC RUNNER ☆</h1>
  <canvas id="gameCanvas" width="640" height="400"></canvas>
  <footer>arrows / WASD · Space or W/↑ to jump · explore all rooms · find the idol · reach the EXIT</footer>
  <script type="module" src="src/main.js"></script>
</body>
</html>
