<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monte Clone — Aztec Relic Runner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0620;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #ccc;
    }
    h1 {
      font-size: 14px;
      letter-spacing: 3px;
      color: #ffd700;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    #game-canvas {
      display: block;
      border: 3px solid #5533aa;
      box-shadow: 0 0 30px #5533aa88;
      cursor: none;
    }
    #controls {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>Monte Clone &mdash; Aztec Relic Runner</h1>
  <canvas id="game-canvas"></canvas>
  <div id="controls">
    ← → / A D : Move &nbsp;|&nbsp; ↑ ↓ / W S : Climb &nbsp;|&nbsp; Space / K : Jump &nbsp;|&nbsp; Enter / R : Restart
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
